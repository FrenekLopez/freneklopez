name: Actualizar Estadísticas de GitHub

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Otorgamos permisos para que el bot pueda hacer push
permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4 # Actualizado a v4

      - name: 🔄 Descargar estadísticas (SVGs)
        run: |
          # Usamos un User-Agent (-A) para simular que somos un navegador real y evitar el bloqueo
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -f -o stats.svg "https://github-readme-stats.vercel.app/api?username=freneklopez&theme=dark&hide_border=false&include_all_commits=false&count_private=false"
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -f -o streak.svg "https://nirzak-streak-stats.vercel.app/?user=freneklopez&theme=dark&hide_border=false"
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -f -o langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=freneklopez&theme=dark&hide_border=false&include_all_commits=false&count_private=false&layout=compact"

      - name: 🚀 Commit y Push de los cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add stats.svg streak.svg langs.svg
          git commit -m "chore: actualizar estadísticas diarias de GitHub [skip ci]" || echo "No hay cambios para hacer commit"
          git push
